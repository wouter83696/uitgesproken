<!doctype html>
<html lang="nl">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#f7f6f2">
  <title>Nieuwe kaartenset wizard - Uitgesproken</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=Fraunces:opsz,wght@9..144,400;9..144,500&family=IBM+Plex+Sans:wght@400;500;600&family=Inter:wght@400;500;600&family=Plus+Jakarta+Sans:wght@400;500;600&family=Space+Grotesk:wght@400;500;600&family=Merriweather:wght@400;700&family=Playfair+Display:wght@400;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/cards.css?v=20260616y">
  <link rel="stylesheet" href="/admin/admin.css?v=20260616y">
  <link rel="stylesheet" href="/css/wizard.css?v=20260616y">
</head>
<body class="wizardPage">
  <div id="wizardApp" class="wizardApp"></div>

  <script>
    (function(){
      function showWizardBootError(message){
        var root=document.getElementById('wizardApp');
        if(!root||root.children.length)return;
        root.innerHTML='<div class="appBoot wizardBoot"><div class="appBootInner">'+
          '<div class="appBootWordmark">Wizard kon niet laden</div>'+
          '<div class="appBootSub">'+String(message||'Onbekende fout')+'</div>'+
        '</div></div>';
      }
      window.addEventListener('error',function(event){
        var where=(event&&event.filename)?(' in '+event.filename.split('/').pop()+':'+event.lineno+':'+event.colno):'';
        showWizardBootError(((event&&event.message)||'Script kon niet starten')+where);
      });
      window.addEventListener('unhandledrejection',function(event){
        var reason=event&&event.reason;
        showWizardBootError((reason&&reason.message)||String(reason||'Promise fout'));
      });
      setTimeout(function(){
        var root=document.getElementById('wizardApp');
        if(root&&!root.children.length)showWizardBootError('Startscript reageert niet');
      },2200);
    })();
  </script>
  <script src="/js/shared-background-preview.js?v=20260616y"></script>
  <script src="/js/shared-card-renderer.js?v=20260616y"></script>
  <script src="/js/shared-preview-shell.js?v=20260616y"></script>
  <script src="/js/shared-preview-interactions.js?v=20260616y"></script>
  <script type="module" src="/js/wizard.js?v=20260616y"></script>
</body>
</html>
