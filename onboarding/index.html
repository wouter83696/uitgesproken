<!doctype html>
<html lang="nl">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Kies je gebruikersnaam — Uitgesproken</title>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:ital,wght@0,400;0,500;0,600;1,400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/admin/admin.css">
  <style>
    .onboardContent {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      flex: 1;
      padding: 40px 24px;
      min-height: 100vh;
    }
    .onboardCard {
      background: #fff;
      border-radius: 18px;
      padding: 44px 40px 36px;
      width: 100%;
      max-width: 380px;
      box-shadow: 0 2px 16px rgba(15,23,42,.06), 0 0 0 1px rgba(26,26,46,.05);
      text-align: center;
    }
    .onboardCard h1 {
      font-size: 19px;
      font-weight: 700;
      color: var(--k);
      letter-spacing: -.02em;
      margin-bottom: 6px;
    }
    .onboardTagline {
      font-size: 13px;
      color: var(--k3);
      margin-bottom: 28px;
      line-height: 1.55;
      text-align: center;
      text-wrap: balance;
    }
    .unFieldWrap {
      position: relative;
      margin-bottom: 6px;
    }
    .unPrefix {
      position: absolute;
      left: 13px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--k3);
      font-size: 14px;
      font-weight: 500;
      pointer-events: none;
      user-select: none;
    }
    .unInput {
      width: 100%;
      box-sizing: border-box;
      padding: 10px 13px 10px 26px;
      border-radius: 10px;
      border: 1.5px solid rgba(26,26,46,.14);
      font-family: inherit;
      font-size: 14px;
      color: var(--k);
      background: var(--bg2, #f8f9fb);
      outline: none;
      transition: border-color .15s;
    }
    .unInput:focus {
      border-color: var(--accent, #6366f1);
      background: #fff;
    }
    .unInput.ok   { border-color: #16a34a; }
    .unInput.err  { border-color: #dc2626; }

    .unStatus {
      font-size: 12px;
      min-height: 18px;
      margin-bottom: 14px;
      text-align: left;
      padding-left: 2px;
    }
    .unStatus.ok      { color: #16a34a; }
    .unStatus.err     { color: #dc2626; }
    .unStatus.checking{ color: var(--k3); }

    .suggestions {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
      justify-content: center;
      margin-bottom: 20px;
    }
    .suggestion {
      font-size: 12px;
      padding: 4px 10px;
      border-radius: 20px;
      border: 1px solid rgba(26,26,46,.12);
      background: var(--bg2, #f8f9fb);
      color: var(--k2);
      cursor: pointer;
      transition: background .12s, border-color .12s;
    }
    .suggestion:hover {
      background: rgba(99,102,241,.07);
      border-color: rgba(99,102,241,.25);
      color: var(--k);
    }
    .suggestion::before { content: '@'; opacity: .45; }

    .btnSave {
      width: 100%;
      padding: 11px 20px;
      border-radius: 10px;
      border: none;
      background: var(--accent, #6366f1);
      color: #fff;
      font-family: inherit;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: opacity .15s;
    }
    .btnSave:disabled { opacity: .45; cursor: default; }
    .btnSave:not(:disabled):hover { opacity: .88; }

    .onboardNote {
      font-size: 11.5px;
      color: var(--k3);
      margin-top: 18px;
      line-height: 1.5;
    }
    .onboardFatal {
      margin-top: 14px;
      padding: 10px 12px;
      border-radius: 10px;
      background: #fef2f2;
      color: #b91c1c;
      font-size: 12.5px;
      line-height: 1.5;
      text-align: left;
      display: none;
    }

    .sbSkeletonSets {
      padding: 8px 12px 0;
      display: flex;
      flex-direction: column;
      gap: 4px;
    }
    .sbSkeletonItem {
      height: 32px;
      border-radius: 8px;
      background: rgba(255,255,255,.07);
      animation: skPulse 1.8s ease-in-out infinite;
    }
    .sbSkeletonItem:nth-child(2) { animation-delay: .15s; width: 82%; }
    .sbSkeletonItem:nth-child(3) { animation-delay: .3s;  width: 66%; }
    .sbSkeletonItem:nth-child(4) { animation-delay: .45s; width: 74%; }
    .sbSkeletonItem:nth-child(5) { animation-delay: .6s;  width: 55%; }
    @keyframes skPulse {
      0%, 100% { opacity: .35; }
      50%       { opacity: .6; }
    }

    #app.is-onboard-page { --sb: 260px; }
    #app.is-onboard-page .sbBrandText { overflow: visible; }
    #app.is-onboard-page .sbTitle { line-height: 1.3; }

    @media (max-width: 600px) {
      .sidebar { display: none !important; }
      .onboardContent { background: var(--bg2); }
    }
  </style>
</head>
<body>

<div id="app" class="is-onboard-page">

  <aside class="sidebar">
    <div class="sbBlobs" aria-hidden="true">
      <div class="sbBlob sbBlob1"></div>
      <div class="sbBlob sbBlob2"></div>
      <div class="sbBlob sbBlob3"></div>
      <div class="sbBlob sbBlob4"></div>
      <div class="sbBlob sbBlob5"></div>
      <div class="sbBlob sbBlob6"></div>
    </div>
    <div class="sbH">
      <div class="sbBrand">
        <div class="lm sbLogo"><img src="/assets/logo-icons/masters/master-squircle.svg" alt="Uitgesproken"></div>
        <div class="sbBrandText">
          <div class="sbTitle">Uitgesproken</div>
        </div>
      </div>
    </div>
    <div class="sbScroll" style="opacity:.45;pointer-events:none">
      <div class="sbSkeletonSets">
        <div class="sbSkeletonItem"></div>
        <div class="sbSkeletonItem"></div>
        <div class="sbSkeletonItem"></div>
        <div class="sbSkeletonItem"></div>
        <div class="sbSkeletonItem"></div>
      </div>
    </div>
  </aside>

  <main class="content onboardContent">
    <div class="onboardCard">
      <h1>Kies je gebruikersnaam</h1>
      <p class="onboardTagline">
        Je gebruikersnaam is je persoonlijke adres op Uitgesproken. Je kunt hem later niet meer wijzigen.
      </p>

      <div class="unFieldWrap">
        <span class="unPrefix">@</span>
        <input
          id="unInput"
          class="unInput"
          type="text"
          placeholder="gebruikersnaam"
          autocomplete="off"
          autocapitalize="none"
          spellcheck="false"
          maxlength="30"
        >
      </div>
      <div class="unStatus" id="unStatus"></div>

      <div class="suggestions" id="suggestions"></div>

      <button class="btnSave" id="btnSave" disabled>Gebruikersnaam kiezen</button>

      <p class="onboardNote">
        Alleen kleine letters, cijfers, koppeltekens en underscores. Minimaal 3 tekens.
      </p>
      <div class="onboardFatal" id="fatalMsg"></div>
    </div>
  </main>

</div>

<script>
  (function(){
    var blobs = document.querySelectorAll('.sbBlob');
    blobs.forEach(function(b, i){ b.style.animationDelay = (i * 0.4) + 's'; });
  })();
</script>
<script type="module">
  import { supabase, ensureOwnProfile } from '../js/supabase-client.js';

  function normalizeRedirect(target) {
    const raw = String(target || '').trim();
    if (!raw) return '/dashboard/';
    if (raw === '/onboarding' || raw === '/onboarding/') return '/dashboard/';
    if (!raw.startsWith('/') || raw.startsWith('//')) return '/dashboard/';
    return raw;
  }

  const input   = document.getElementById('unInput');
  const status  = document.getElementById('unStatus');
  const saveBtn = document.getElementById('btnSave');
  const fatalEl = document.getElementById('fatalMsg');

  function setStatus(msg, type) {
    status.textContent = msg;
    status.className = 'unStatus' + (type ? ' ' + type : '');
    input.className  = 'unInput'  + (type ? ' ' + type : '');
  }

  function showFatal(msg) {
    fatalEl.textContent = msg;
    fatalEl.style.display = 'block';
    input.disabled = true;
    saveBtn.disabled = true;
    setStatus('', '');
  }

  // ── Auth check ──────────────────────────────────────────────
  const { data: { session } } = await supabase.auth.getSession();
  if (!session) {
    location.href = '/login/?redirect=/onboarding/';
    throw new Error('not logged in');
  }

  // Probeer eerst gewoon het bestaande profiel te lezen.
  let { data: existingProfile, error: existingProfileError } = await supabase
    .from('profiles')
    .select('username')
    .eq('id', session.user.id)
    .maybeSingle();

  // Alleen als er echt nog geen profiel is, proberen we een basisrij aan te maken.
  if (!existingProfile && !existingProfileError) {
    const ensured = await ensureOwnProfile(session.user);
    if (ensured.error) {
      showFatal('We konden je profiel niet voorbereiden. Vernieuw de pagina en probeer opnieuw.');
      throw ensured.error;
    }

    const retry = await supabase
      .from('profiles')
      .select('username')
      .eq('id', session.user.id)
      .maybeSingle();

    existingProfile = retry.data || null;
    existingProfileError = retry.error || null;
  }

  if (existingProfileError) {
    showFatal('We konden je profiel niet laden. Vernieuw de pagina en probeer opnieuw.');
    throw existingProfileError;
  }

  if (existingProfile?.username) {
    const params = new URLSearchParams(location.search);
    location.href = normalizeRedirect(params.get('redirect'));
    throw new Error('already has username');
  }

  // ── Suggesties genereren vanuit displaynaam ─────────────────
  function toSuggestions(displayName) {
    if (!displayName) return [];
    const base = displayName
      .toLowerCase()
      .replace(/[^a-z0-9\s-]/g, '')
      .trim();
    const parts = base.split(/\s+/).filter(Boolean);
    const candidates = new Set();

    if (parts[0]) candidates.add(parts[0]);
    if (parts.length >= 2) {
      candidates.add(parts[0] + parts[1]);
      candidates.add(parts[0] + '-' + parts[1]);
      candidates.add(parts[0] + '.' .replace('.', '-') + parts[1]);
    }
    if (parts[parts.length - 1] && parts.length > 1) {
      candidates.add(parts[parts.length - 1]);
    }

    return [...candidates]
      .map(s => s.replace(/[^a-z0-9_-]/g, '').replace(/-+/g, '-').replace(/^-|-$/g, ''))
      .filter(s => s.length >= 3 && s.length <= 30)
      .slice(0, 4);
  }

  const md = session.user.user_metadata || {};
  const displayName = md.full_name || md.name || '';
  const suggestions = toSuggestions(displayName);

  const suggestionsEl = document.getElementById('suggestions');
  suggestions.forEach(function(s) {
    const btn = document.createElement('button');
    btn.className = 'suggestion';
    btn.textContent = s;
    btn.addEventListener('click', function() {
      document.getElementById('unInput').value = s;
      checkUsername(s);
    });
    suggestionsEl.appendChild(btn);
  });

  // ── Validatie ───────────────────────────────────────────────
  const FORMAT_RE = /^[a-z0-9][a-z0-9_-]{1,28}[a-z0-9]$/;
  let checkTimer = null;
  let lastChecked = '';
  let isValid = false;

  async function checkUsername(val) {
    const v = val.toLowerCase().trim();
    lastChecked = v;
    isValid = false;
    saveBtn.disabled = true;

    if (!v) { setStatus('', ''); return; }

    if (v.length < 3) {
      setStatus('Minimaal 3 tekens.', 'err'); return;
    }
    if (v.length > 30) {
      setStatus('Maximaal 30 tekens.', 'err'); return;
    }
    if (!FORMAT_RE.test(v)) {
      setStatus('Alleen kleine letters, cijfers, - en _. Begint en eindigt met een letter of cijfer.', 'err');
      return;
    }

    setStatus('Beschikbaarheid controleren…', 'checking');

    const { data, error } = await supabase.rpc('is_username_available', { uname: v });

    if (lastChecked !== v) return; // verouderd resultaat

    if (error) {
      setStatus('Kon niet controleren, probeer opnieuw.', 'err'); return;
    }

    if (data === true) {
      setStatus('@' + v + ' is beschikbaar.', 'ok');
      isValid = true;
      saveBtn.disabled = false;
    } else {
      setStatus('@' + v + ' is al in gebruik of niet toegestaan.', 'err');
    }
  }

  input.addEventListener('input', function() {
    const raw = input.value.replace(/[^a-z0-9_-]/gi, '').toLowerCase();
    if (raw !== input.value) input.value = raw;

    clearTimeout(checkTimer);
    isValid = false;
    saveBtn.disabled = true;
    if (!raw) { setStatus('', ''); return; }
    setStatus('Controleren…', 'checking');
    checkTimer = setTimeout(function() { checkUsername(raw); }, 500);
  });

  // ── Opslaan ─────────────────────────────────────────────────
  saveBtn.addEventListener('click', async function() {
    if (!isValid) return;
    const v = input.value.toLowerCase().trim();

    saveBtn.disabled = true;
    saveBtn.textContent = 'Opslaan…';

    const profileCheck = await supabase
      .from('profiles')
      .select('id')
      .eq('id', session.user.id)
      .maybeSingle();

    if (profileCheck.error) {
      saveBtn.disabled = false;
      saveBtn.textContent = 'Gebruikersnaam kiezen';
      showFatal('We konden je profiel niet controleren. Vernieuw de pagina en probeer opnieuw.');
      return;
    }

    if (!profileCheck.data) {
      const ensuredBeforeSave = await ensureOwnProfile(session.user);
      if (ensuredBeforeSave.error) {
        saveBtn.disabled = false;
        saveBtn.textContent = 'Gebruikersnaam kiezen';
        showFatal('We konden je profiel niet opslaan. Vernieuw de pagina en probeer opnieuw.');
        return;
      }
    }

    const { error } = await supabase
      .from('profiles')
      .upsert({ id: session.user.id, username: v }, { onConflict: 'id' });

    if (error) {
      saveBtn.disabled = false;
      saveBtn.textContent = 'Gebruikersnaam kiezen';
      setStatus('Opslaan mislukt: ' + error.message, 'err');
      return;
    }

    // Verify: check dat de username ook echt is opgeslagen
    const { data: saved } = await supabase
      .from('profiles').select('username').eq('id', session.user.id).single();
    if (!saved?.username) {
      saveBtn.disabled = false;
      saveBtn.textContent = 'Gebruikersnaam kiezen';
      setStatus('Opslaan mislukt — probeer opnieuw.', 'err');
      return;
    }

    const params = new URLSearchParams(location.search);
    location.href = normalizeRedirect(params.get('redirect'));
  });

  input.focus();
</script>
</body>
</html>
