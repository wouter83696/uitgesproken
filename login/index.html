<!doctype html>
<html lang="nl">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Inloggen — Uitgesproken</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'IBM Plex Sans', system-ui, sans-serif;
      background: #f4f6f7;
      min-height: 100dvh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .card {
      background: #fff;
      border-radius: 20px;
      padding: 48px 40px;
      width: 100%;
      max-width: 400px;
      box-shadow: 0 4px 24px rgba(15,23,42,.07);
      text-align: center;
    }

    .logo {
      font-size: 22px;
      font-weight: 700;
      color: #1a1a2e;
      letter-spacing: -.02em;
      margin-bottom: 8px;
    }

    .tagline {
      font-size: 14px;
      color: #7f8996;
      margin-bottom: 40px;
    }

    .btn-google {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      width: 100%;
      padding: 13px 20px;
      border-radius: 12px;
      border: 1.5px solid rgba(26,26,46,.12);
      background: #fff;
      font-size: 15px;
      font-weight: 600;
      color: #1a1a2e;
      cursor: pointer;
      transition: background .15s, border-color .15s, box-shadow .15s;
    }

    .btn-google:hover {
      background: #f8fafb;
      border-color: rgba(79,142,158,.4);
      box-shadow: 0 2px 8px rgba(79,142,158,.12);
    }

    .btn-google svg {
      flex-shrink: 0;
    }

    .divider {
      margin: 28px 0;
      border: none;
      border-top: 1px solid rgba(26,26,46,.07);
    }

    .note {
      font-size: 12px;
      color: #a0aab4;
      line-height: 1.5;
    }

    .error {
      margin-top: 16px;
      padding: 10px 14px;
      border-radius: 8px;
      background: #fef2f2;
      color: #b91c1c;
      font-size: 13px;
      display: none;
    }
  </style>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
  <div class="card">
    <div class="logo">Uitgesproken</div>
    <div class="tagline">Gesprekskaarten voor teams en organisaties</div>

    <button class="btn-google" id="btnGoogle">
      <svg width="18" height="18" viewBox="0 0 18 18">
        <path fill="#4285F4" d="M17.64 9.2c0-.637-.057-1.251-.164-1.84H9v3.481h4.844c-.209 1.125-.843 2.078-1.796 2.717v2.258h2.908c1.702-1.567 2.684-3.875 2.684-6.615z"/>
        <path fill="#34A853" d="M9 18c2.43 0 4.467-.806 5.956-2.184l-2.908-2.258c-.806.54-1.837.86-3.048.86-2.344 0-4.328-1.584-5.036-3.711H.957v2.332A8.997 8.997 0 0 0 9 18z"/>
        <path fill="#FBBC05" d="M3.964 10.707A5.41 5.41 0 0 1 3.682 9c0-.593.102-1.17.282-1.707V4.961H.957A8.996 8.996 0 0 0 0 9c0 1.452.348 2.827.957 4.039l3.007-2.332z"/>
        <path fill="#EA4335" d="M9 3.58c1.321 0 2.508.454 3.44 1.345l2.582-2.58C13.463.891 11.426 0 9 0A8.997 8.997 0 0 0 .957 4.961L3.964 7.293C4.672 5.163 6.656 3.58 9 3.58z"/>
      </svg>
      Inloggen met Google
    </button>

    <div class="error" id="errMsg"></div>

    <hr class="divider">
    <p class="note">Door in te loggen ga je akkoord met onze gebruiksvoorwaarden. Je gegevens worden veilig opgeslagen via Supabase.</p>
  </div>

  <script type="module">
    import { supabase } from '../js/supabase-client.js';

    // Al ingelogd? Stuur door naar dashboard
    const { data: { session } } = await supabase.auth.getSession();
    if (session) location.href = '/dashboard/';

    document.getElementById('btnGoogle').addEventListener('click', async () => {
      const { error } = await supabase.auth.signInWithOAuth({
        provider: 'google',
        options: {
          redirectTo: location.origin + '/dashboard/'
        }
      });
      if (error) {
        const el = document.getElementById('errMsg');
        el.textContent = 'Inloggen mislukt: ' + error.message;
        el.style.display = 'block';
      }
    });
  </script>
</body>
</html>
