<!doctype html>
<html lang="nl">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Inloggen — Uitgesproken</title>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:ital,wght@0,400;0,500;0,600;1,400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/admin/admin.css">
  <style>
    /* ── Login-specifieke stijlen ── */
    .loginContent {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      flex: 1;
      padding: 40px 24px;
      min-height: 100vh;
    }
    .loginCard {
      background: #fff;
      border-radius: 18px;
      padding: 44px 40px 36px;
      width: 100%;
      max-width: 360px;
      box-shadow: 0 2px 16px rgba(15,23,42,.06), 0 0 0 1px rgba(26,26,46,.05);
      text-align: center;
    }
    .loginCard h1 {
      font-size: 19px;
      font-weight: 700;
      color: var(--k);
      letter-spacing: -.02em;
      margin-bottom: 6px;
    }
    .loginCard .loginTagline {
      font-size: 13px;
      color: var(--k3);
      margin-bottom: 36px;
      line-height: 1.45;
    }
    .btnGoogle {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      width: 100%;
      padding: 12px 20px;
      border-radius: 10px;
      border: 1.5px solid rgba(26,26,46,.12);
      background: #fff;
      font-family: inherit;
      font-size: 14px;
      font-weight: 600;
      color: var(--k);
      cursor: pointer;
      transition: background .15s, border-color .15s, box-shadow .15s;
    }
    .btnGoogle:hover {
      background: rgba(66,133,244,.04);
      border-color: rgba(26,26,46,.12);
      box-shadow: 0 1px 3px rgba(0,0,0,.08), 0 1px 2px rgba(0,0,0,.06);
    }
    .btnGoogle:active {
      background: rgba(66,133,244,.10);
      box-shadow: none;
    }
    .btnGoogle svg { flex-shrink: 0; }
    .loginDivider {
      margin: 24px 0;
      border: none;
      border-top: 1px solid rgba(26,26,46,.06);
    }
    .loginNote {
      font-size: 11.5px;
      color: var(--k3);
      line-height: 1.5;
    }
    .loginError {
      margin-top: 14px;
      padding: 9px 13px;
      border-radius: 8px;
      background: #fef2f2;
      color: #b91c1c;
      font-size: 12.5px;
      display: none;
      text-align: left;
    }

    /* ── Sidebar: skeleton-stijl voor login ── */
    .sbSkeletonSets {
      padding: 8px 12px 0;
      display: flex;
      flex-direction: column;
      gap: 4px;
    }
    .sbSkeletonItem {
      height: 32px;
      border-radius: 8px;
      background: rgba(255,255,255,.07);
      animation: skPulse 1.8s ease-in-out infinite;
    }
    .sbSkeletonItem:nth-child(2) { animation-delay: .15s; width: 82%; }
    .sbSkeletonItem:nth-child(3) { animation-delay: .3s; width: 66%; }
    .sbSkeletonItem:nth-child(4) { animation-delay: .45s; width: 74%; }
    .sbSkeletonItem:nth-child(5) { animation-delay: .6s; width: 55%; }
    @keyframes skPulse {
      0%, 100% { opacity: .35; }
      50% { opacity: .6; }
    }

    /* ── Login-pagina: sidebar breder zodat tekst past ── */
    #app.is-login-page {
      --sb: 260px;
    }

    /* ── Responsive: sidebar verbergen op smal scherm ── */
    @media (max-width: 600px) {
      .sidebar { display: none !important; }
      .loginContent { background: var(--bg2); }
    }
  </style>
</head>
<body>

<div id="app" class="is-login-page">

  <aside class="sidebar">
    <div class="sbBlobs" aria-hidden="true">
      <div class="sbBlob sbBlob1"></div>
      <div class="sbBlob sbBlob2"></div>
      <div class="sbBlob sbBlob3"></div>
      <div class="sbBlob sbBlob4"></div>
      <div class="sbBlob sbBlob5"></div>
      <div class="sbBlob sbBlob6"></div>
    </div>
    <div class="sbH">
      <div class="sbBrand">
        <div class="lm sbLogo"><img src="/assets/logo-icons/masters/master-squircle.svg" alt="Uitgesproken"></div>
        <div class="sbBrandText">
          <div class="sbTitle">Uitgesproken</div>
        </div>
      </div>
    </div>
    <div class="sbScroll" style="opacity:.45;pointer-events:none">
      <div class="sbSkeletonSets">
        <div class="sbSkeletonItem"></div>
        <div class="sbSkeletonItem"></div>
        <div class="sbSkeletonItem"></div>
        <div class="sbSkeletonItem"></div>
        <div class="sbSkeletonItem"></div>
      </div>
    </div>
    <div class="sbFoot" style="opacity:.35;pointer-events:none">
      <button class="addBtn" disabled>
        <span class="addBtnIcon" aria-hidden="true">
          <svg viewBox="0 0 20 20"><path d="M10 4v12M4 10h12"/></svg>
        </span>
        <span class="addBtnLabel">Nieuwe set</span>
      </button>
      <div class="sbDivider"></div>
      <button class="sbGh" disabled>
        <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><rect x="2" y="6" width="20" height="12" rx="3"/><path d="M6 10h.01M10 10h.01M14 10h.01M18 10h.01M6 14h12"/></svg>
        <span class="sbGhLabel">Sneltoetsen</span>
      </button>
    </div>
  </aside>

  <main class="content loginContent">
    <div class="loginCard">
      <h1>Welkom terug</h1>
      <p class="loginTagline">Log in om verder te gaan met je ruimte.</p>

      <button class="btnGoogle" id="btnGoogle">
        <svg width="18" height="18" viewBox="0 0 18 18">
          <path fill="#4285F4" d="M17.64 9.2c0-.637-.057-1.251-.164-1.84H9v3.481h4.844c-.209 1.125-.843 2.078-1.796 2.717v2.258h2.908c1.702-1.567 2.684-3.875 2.684-6.615z"/>
          <path fill="#34A853" d="M9 18c2.43 0 4.467-.806 5.956-2.184l-2.908-2.258c-.806.54-1.837.86-3.048.86-2.344 0-4.328-1.584-5.036-3.711H.957v2.332A8.997 8.997 0 0 0 9 18z"/>
          <path fill="#FBBC05" d="M3.964 10.707A5.41 5.41 0 0 1 3.682 9c0-.593.102-1.17.282-1.707V4.961H.957A8.996 8.996 0 0 0 0 9c0 1.452.348 2.827.957 4.039l3.007-2.332z"/>
          <path fill="#EA4335" d="M9 3.58c1.321 0 2.508.454 3.44 1.345l2.582-2.58C13.463.891 11.426 0 9 0A8.997 8.997 0 0 0 .957 4.961L3.964 7.293C4.672 5.163 6.656 3.58 9 3.58z"/>
        </svg>
        Inloggen met Google
      </button>

      <div class="loginError" id="errMsg"></div>

      <hr class="loginDivider">
      <p class="loginNote">
        We slaan alleen je naam, e-mailadres en profielfoto op vanuit je Google-account — uitsluitend om in te loggen. Geen wachtwoorden, geen tracking.
      </p>
    </div>
  </main>

</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<script>
  // Blobs animeren zoals in het dashboard
  (function(){
    var blobs = document.querySelectorAll('.sbBlob');
    blobs.forEach(function(b, i){
      b.style.animationDelay = (i * 0.4) + 's';
    });
  })();
</script>
<script type="module">
  import { supabase } from '../js/supabase-client.js';

  function normalizeRedirect(target) {
    const raw = String(target || '').trim();
    if (!raw) return '/dashboard/';
    if (raw === '/onboarding' || raw === '/onboarding/') return '/dashboard/';
    if (!raw.startsWith('/') || raw.startsWith('//')) return '/dashboard/';
    return raw;
  }

  function resolveAuthRedirectOrigin() {
    const host = String(location.hostname || '').toLowerCase();
    if (host === 'localhost' || host === '127.0.0.1' || host === '::1') {
      return 'https://uitgesproken.me';
    }
    return location.origin;
  }

  // Al ingelogd? Stuur direct door
  const { data: { session } } = await supabase.auth.getSession();
  if (session) {
    const params = new URLSearchParams(location.search);
    location.href = normalizeRedirect(params.get('redirect'));
  }

  document.getElementById('btnGoogle').addEventListener('click', async () => {
    const btn = document.getElementById('btnGoogle');
    btn.disabled = true;
    btn.textContent = 'Even wachten…';

    const params = new URLSearchParams(location.search);
    const redirectTo = resolveAuthRedirectOrigin() + normalizeRedirect(params.get('redirect'));

    const { error } = await supabase.auth.signInWithOAuth({
      provider: 'google',
      options: { redirectTo }
    });

    if (error) {
      const el = document.getElementById('errMsg');
      el.textContent = 'Inloggen mislukt: ' + error.message;
      el.style.display = 'block';
      btn.disabled = false;
      btn.innerHTML = `<svg width="18" height="18" viewBox="0 0 18 18">…</svg> Inloggen met Google`;
    }
  });
</script>
</body>
</html>
