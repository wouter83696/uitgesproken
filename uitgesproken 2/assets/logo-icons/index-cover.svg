<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 85 55" font-family="IBM Plex Sans, system-ui, -apple-system, sans-serif">
  <!-- Achtergrond: licht mintgroen -->
  <rect width="85" height="55" fill="#e8f6f5"/>

  <!-- Zachte blob accenten -->
  <ellipse cx="76" cy="6" rx="20" ry="16" fill="#c2ebe8" opacity="0.7"/>
  <ellipse cx="8" cy="50" rx="16" ry="12" fill="#b8e8e4" opacity="0.5"/>

  <!-- Logo: master-mint gecentreerd bovenaan -->
  <image href="data:image/svg+xml;base64," x="30" y="5" width="25" height="25"/>

  <!-- Uitgesproken -->
  <text x="42.5" y="37" text-anchor="middle"
        font-size="8.5" font-weight="500" letter-spacing="0.1"
        fill="#4d9199">Uitgesproken</text>

  <!-- Ondertitel -->
  <text x="42.5" y="46" text-anchor="middle"
        font-size="5" font-weight="400" letter-spacing="0.05"
        fill="#4d9199" opacity="0.7">Ruimte om te verkennen</text>
</svg>