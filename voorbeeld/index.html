<!doctype html>
<html lang="nl">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <meta name="theme-color" content="#f8faf9">
  <title>Samen onderzoeken — Uitgesproken</title>
  <link rel="icon" type="image/png" href="/assets/logo-icons/favicon/favicon-tab-32x32.png?v=icon-36">
  <link rel="apple-touch-icon" href="/assets/logo-icons/app/apple-touch-icon.png?v=ios-15">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *{box-sizing:border-box}
    html,body{min-height:100%;margin:0}
    body{
      min-height:100vh;
      min-height:100dvh;
      font-family:"IBM Plex Sans",system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
      color:#30475d;
      background:
        radial-gradient(circle at 18% 15%, rgba(168,225,221,.26), transparent 32%),
        radial-gradient(circle at 88% 78%, rgba(243,215,163,.22), transparent 34%),
        #f8faf9;
    }
    .page{
      min-height:100vh;
      min-height:100dvh;
      display:grid;
      place-items:center;
      padding:clamp(22px,5vw,56px);
    }
    .shell{
      width:min(1040px,100%);
      display:grid;
      grid-template-columns:minmax(0,1fr) minmax(260px,360px);
      align-items:center;
      gap:clamp(28px,7vw,86px);
    }
    .brand{
      display:inline-flex;
      align-items:center;
      gap:10px;
      color:#557183;
      font-size:15px;
      font-weight:700;
      margin-bottom:clamp(34px,8vh,88px);
    }
    .brand img{
      width:36px;
      height:36px;
      display:block;
    }
    .eyebrow{
      color:#7d929e;
      font-size:15px;
      font-weight:600;
      margin:0 0 14px;
    }
    h1{
      margin:0;
      color:#2f5f69;
      font-size:clamp(44px,8vw,86px);
      line-height:.96;
      letter-spacing:0;
      font-weight:700;
    }
    .lead{
      max-width:570px;
      margin:clamp(18px,2.5vw,26px) 0 0;
      color:#53687a;
      font-size:clamp(18px,2.4vw,25px);
      line-height:1.42;
    }
    .actions{
      display:flex;
      flex-wrap:wrap;
      align-items:center;
      gap:14px;
      margin-top:clamp(28px,5vw,46px);
    }
    .button{
      display:inline-flex;
      align-items:center;
      justify-content:center;
      min-height:52px;
      padding:0 24px;
      border-radius:999px;
      color:#fff;
      background:#4e9aa6;
      box-shadow:0 12px 28px rgba(78,154,166,.2);
      text-decoration:none;
      font-size:17px;
      font-weight:700;
    }
    .ghost{
      color:#66808e;
      text-decoration:none;
      font-size:16px;
      font-weight:600;
    }
    .preview{
      justify-self:center;
      width:min(100%,340px);
      aspect-ratio:1/1.31;
      border-radius:34px;
      padding:18px;
      background:rgba(255,255,255,.64);
      border:1px solid rgba(86,126,135,.12);
      box-shadow:0 22px 64px rgba(47,95,105,.12);
      display:flex;
      align-items:center;
      justify-content:center;
    }
    .preview img{
      width:100%;
      height:100%;
      object-fit:contain;
      filter:drop-shadow(0 14px 24px rgba(58,90,96,.13));
    }
    @media (max-width:760px){
      .page{place-items:start center;padding:20px 18px 32px}
      .shell{
        min-height:calc(100vh - 52px);
        min-height:calc(100dvh - 52px);
        grid-template-columns:1fr;
        align-content:center;
        gap:32px;
      }
      .brand{margin-bottom:46px}
      .preview{
        width:min(72vw,260px);
        grid-row:1;
      }
      .content{grid-row:2;text-align:left}
      h1{font-size:clamp(40px,13vw,58px)}
      .lead{font-size:17px}
      .button{width:100%}
      .ghost{width:100%;text-align:center}
    }
  </style>
</head>
<body>
  <main class="page">
    <section class="shell" aria-label="Samen onderzoeken">
      <div class="content">
        <div class="brand">
          <img src="/assets/logo-icons/masters/master-squircle.svg" alt="">
          <span>Uitgesproken</span>
        </div>
        <p class="eyebrow">Voorbeeld kaartenset</p>
        <h1>Samen onderzoeken</h1>
        <p class="lead">Gesprekskaarten om samen te kijken naar wat zichtbaar wordt, wat schuurt en wat nog onuitgesproken blijft in de samenwerking.</p>
        <div class="actions">
          <a class="button" href="/kaarten/?set=samenwerken">Kaartenset openen</a>
          <a class="ghost" href="/kaarten/?set=samenwerken">Naar de kaarten</a>
        </div>
      </div>
      <figure class="preview" aria-hidden="true">
        <img src="/sets/samenwerken/cards/voorkant.svg" alt="">
      </figure>
    </section>
  </main>
</body>
</html>
