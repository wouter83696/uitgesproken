<!doctype html>
<html lang="nl">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <meta name="theme-color" content="#f7fafb">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <title>Uitgesproken</title>
  <link rel="icon" type="image/png" href="/assets/logo-icons/favicon/favicon-tab-32x32.png?v=icon-36">
  <link rel="icon" href="/assets/logo-icons/favicon/favicon.ico">
  <link rel="apple-touch-icon" href="/assets/logo-icons/app/apple-touch-icon.png?v=ios-15">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    html,body{width:100%;min-height:100%;margin:0;background:#fafbfc}
    body{overflow:hidden;font-family:'IBM Plex Sans',system-ui,-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;color:#2f4358}
    .launchPage{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;background:#fbfcfd}
    .launchPageInner{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:0;width:min(92vw,520px);padding:24px;text-align:center;transform:translateY(-4vh)}
    .launchLogo{width:82px;height:82px;display:flex;align-items:center;justify-content:center;margin-bottom:20px}
    .launchLogo img{width:82px;height:82px;display:block}
    .launchWordmark{font-size:28px;font-weight:700;letter-spacing:0;line-height:1;color:#344a60}
    .launchSub{max-width:420px;font-size:15px;font-weight:400;margin-top:13px;line-height:1.45;color:#7b8795}
    @media (max-width:640px){
      .launchPageInner{transform:translateY(-3vh)}
      .launchLogo,.launchLogo img{width:72px;height:72px}
      .launchLogo{margin-bottom:17px}
      .launchWordmark{font-size:24px}
      .launchSub{font-size:14px;margin-top:10px}
    }
  </style>
</head>
<body>
  <main class="launchPage" role="main" aria-label="Uitgesproken">
    <div class="launchPageInner" role="status" aria-live="polite">
      <div class="launchLogo">
        <img src="/assets/logo-icons/masters/master-squircle.svg" alt="Uitgesproken">
      </div>
      <div class="launchWordmark">Uitgesproken</div>
      <div class="launchSub">Deze ruimte krijgt binnenkort vorm.</div>
    </div>
  </main>
</body>
</html>
