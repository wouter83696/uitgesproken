<!doctype html>
<html lang="nl">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <meta name="theme-color" content="#f7fafb">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <title>Uitgesproken</title>
  <link rel="icon" type="image/png" href="/assets/logo-icons/favicon/favicon-tab-32x32.png?v=icon-36">
  <link rel="icon" href="/assets/logo-icons/favicon/favicon.ico">
  <link rel="apple-touch-icon" href="/assets/logo-icons/app/apple-touch-icon.png?v=ios-15">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    html,body{width:100%;min-height:100%;margin:0;background:#f7fafb}
    body{overflow:hidden;font-family:'IBM Plex Sans',system-ui,-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;color:#334455}
    .launchPage{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;background:linear-gradient(180deg,#fcfcfd 0%,#f7fafb 100%)}
    .launchPageInner{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:0;padding:24px;text-align:center}
    .launchLogo{width:72px;height:72px;display:flex;align-items:center;justify-content:center;margin-bottom:12px}
    .launchLogo img{width:72px;height:72px;display:block}
    .launchWordmark{font-size:22px;font-weight:700;letter-spacing:0;line-height:1;color:#334455}
    .launchSub{font-size:12.5px;margin-top:8px;color:#667789}
    .launchBar{width:188px;height:8px;margin-top:12px;border-radius:999px;background:rgba(79,142,158,.14);overflow:hidden;box-shadow:inset 0 0 0 1px rgba(79,142,158,.08)}
    .launchBarFill{width:42%;height:100%;border-radius:inherit;background:linear-gradient(90deg,#6fb0bc 0%,#4f95a3 100%);animation:launchPulse 1.8s cubic-bezier(.33,1,.68,1) infinite}
    @keyframes launchPulse{0%{transform:translateX(-110%);width:38%}50%{width:56%}100%{transform:translateX(270%);width:38%}}
    @media (prefers-reduced-motion:reduce){.launchBarFill{animation:none;width:64%}}
  </style>
</head>
<body>
  <main class="launchPage" role="main" aria-label="Uitgesproken">
    <div class="launchPageInner" role="status" aria-live="polite">
      <div class="launchLogo">
        <img src="/assets/logo-icons/masters/master-squircle.svg" alt="Uitgesproken">
      </div>
      <div class="launchWordmark">Uitgesproken</div>
      <div class="launchSub">Ruimte aan het verkennen..</div>
      <div class="launchBar" aria-hidden="true">
        <div class="launchBarFill"></div>
      </div>
    </div>
  </main>
</body>
</html>
